name: iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Select iOS Simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime or 'SimRuntime' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable') and 'iPhone' in d.get('name', ''):
                      print(d['name'])
                      sys.exit(0)
          print('iPhone 16')
          ")
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Test
        working-directory: ios
        run: |
          xcodebuild test -project SWARM.xcodeproj -scheme SWARM \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-test-results
          path: ios/TestResults.xcresult